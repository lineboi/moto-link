<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Navy background with rounded corners — matches theme_color #06122A -->
  <rect width="192" height="192" rx="36" fill="#06122A"/>
  <!-- Amber accent bar (top) -->
  <rect x="32" y="28" width="128" height="8" rx="4" fill="#FFB300"/>
  <!-- Bold amber "M" logotype -->
  <text
    x="96"
    y="136"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="110"
